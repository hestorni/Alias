<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Hernán · Pagos Prex</title>
<meta name="description" content="Alias de pago Prex para viajes de Uber y DiDi">
<meta name="theme-color" content="#0a0e17">

<link rel="manifest" href="manifest.json">
<link rel="icon" href="assets/uber.png">
<link rel="apple-touch-icon" href="assets/uber.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="bg-noise"></div>
<div class="bg-glow bg-glow--a"></div>
<div class="bg-glow bg-glow--b"></div>

<main class="wrap">

  <header class="masthead">
    <span class="masthead__dot"></span>
    <span class="masthead__text">Cobro activo</span>
  </header>

  <!-- HERO: the payment card -->
  <section class="cardstage" aria-label="Tarjeta de alias de pago">
    <div class="paycard" id="paycard">
      <div class="paycard__sheen"></div>
      <div class="paycard__row paycard__row--top">
        <span class="paycard__brand">PREX</span>
        <span class="paycard__chip" aria-hidden="true"></span>
      </div>

      <div class="paycard__body">
        <span class="paycard__label">Alias</span>
        <div class="paycard__alias" id="aliasText">hernanuber.prex</div>
      </div>

      <div class="paycard__row paycard__row--bottom">
        <span class="paycard__holder">HERNÁN · CONDUCTOR</span>
        <div class="paycard__rides" aria-label="Trabaja con Uber y DiDi">
          <img src="assets/uber.png" alt="Uber" class="paycard__ride-logo">
          <img src="assets/didi.png" alt="DiDi" class="paycard__ride-logo">
        </div>
      </div>
    </div>

    <button class="copybtn" id="copyBtn" type="button" aria-live="polite">
      <svg class="copybtn__icon copybtn__icon--copy" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="9" width="12" height="12" rx="2"></rect>
        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
      </svg>
      <svg class="copybtn__icon copybtn__icon--check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
      <span class="copybtn__text">Copiar alias</span>
    </button>
  </section>

  <!-- WHATSAPP CTA -->
  <a class="wabtn" href="https://wa.me/5493874493131" target="_blank" rel="noopener">
    <svg class="wabtn__icon" viewBox="0 0 24 24" fill="currentColor">
      <path d="M12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.75.46 3.45 1.32 4.95L2 22l5.29-1.39a9.9 9.9 0 0 0 4.75 1.21h.01c5.46 0 9.9-4.45 9.9-9.91C22 6.45 17.5 2 12.04 2Zm5.8 14.05c-.24.68-1.4 1.3-1.93 1.38-.5.08-1.11.11-1.79-.11-.41-.13-.94-.3-1.62-.6-2.85-1.23-4.71-4.09-4.85-4.28-.14-.19-1.16-1.55-1.16-2.95 0-1.4.73-2.09.99-2.37.26-.28.57-.35.76-.35.19 0 .38 0 .55.01.18.01.41-.07.64.49.24.57.81 1.98.88 2.12.07.15.12.32.02.51-.09.19-.14.3-.28.46-.14.16-.29.36-.42.48-.14.13-.28.28-.12.55.16.28.71 1.17 1.53 1.9 1.05.94 1.94 1.23 2.21 1.37.28.14.44.12.6-.07.16-.19.68-.79.87-1.06.18-.28.37-.23.62-.14.26.09 1.63.77 1.91.91.28.14.46.21.53.33.07.12.07.68-.16 1.35Z"/>
    </svg>
    <span>Escribir por WhatsApp</span>
  </a>

  <!-- QUICK ACCESS TO BANKING/WALLET APPS -->
  <section class="shortcuts" aria-label="Accesos directos a mis apps">
    <h2 class="shortcuts__title">Mis apps</h2>
    <div class="shortcuts__grid">

      <a class="shortcut" href="https://www.mercadopago.com.ar" target="_blank" rel="noopener">
        <span class="shortcut__icon"><img src="assets/MP.png" alt="Mercado Pago"></span>
        <span class="shortcut__label">Mercado Pago</span>
      </a>

      <a class="shortcut" href="https://www.naranjax.com" target="_blank" rel="noopener">
        <span class="shortcut__icon"><img src="assets/nx.png" alt="Naranja X"></span>
        <span class="shortcut__label">Naranja X</span>
      </a>

      <a class="shortcut" href="https://www.macro.com.ar" target="_blank" rel="noopener">
        <span class="shortcut__icon"><img src="assets/banco_macro.png" alt="Banco Macro"></span>
        <span class="shortcut__label">Banco Macro</span>
      </a>

      <a class="shortcut" href="https://www.personalpay.com.ar" target="_blank" rel="noopener">
        <span class="shortcut__icon"><img src="assets/personal_pay.png" alt="Personal Pay"></span>
        <span class="shortcut__label">Personal Pay</span>
      </a>

    </div>
  </section>

  <footer class="foot">
    <span>Hernán · Salta, Argentina</span>
  </footer>

</main>

<div class="toast" id="toast">Alias copiado</div>

<script src="js/script.js"></script>
</body>
</html>
