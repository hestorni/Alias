<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hernán - Conductor</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <meta name="theme-color" content="#09090b">
</head>
<body>
    <div class="bg-glow"></div>
    <div class="container">
        <main class="card">
            <div class="avatar">H</div>
            
            <h1>Hernán</h1>
            <p class="subtitle">Datos de Pago y Contacto</p>

            <!-- Botón Grande de Copiar Alias Modificado -->
            <button id="btnCopyLarge" class="btn-large-alias">
                <span class="alias-inside">hernanuber.prex</span>
                <span id="btnCopyText" class="action-inside">Copiar Alias</span>
            </button>

            <!-- Identificación Visual (Uber/DiDi) -->
            <div class="brands-grid">
                <div class="brand-card">
                    <img src="assets/uber.png" alt="Uber">
                    <span>Uber</span>
                </div>
                <div class="brand-card">
                    <img src="assets/didi.png" alt="DiDi">
                    <span>DiDi</span>
                </div>
            </div>

            <!-- Accesos Directos a Apps de Pago -->
            <span class="section-title">Abrir Apps de Pago</span>
            <div class="apps-grid">
                <a href="intent://#Intent;scheme=mercadopago;package=com.mercadopago.wallet;end" class="app-btn" title="Mercado Pago">
                    <div class="app-icon mp">MP</div>
                    <span>Mercado Pago</span>
                </a>
                <a href="intent://#Intent;scheme=macroweb;package=com.macro.bancamacro;end" class="app-btn" title="Banco Macro">
                    <div class="app-icon macro">M</div>
                    <span>Banco Macro</span>
                </a>
                <a href="intent://#Intent;scheme=naranjax;package=com.tarjetanaranja.naranjax;end" class="app-btn" title="Naranja X">
                    <div class="app-icon naranja">NX</div>
                    <span>Naranja X</span>
                </a>
                <a href="intent://#Intent;scheme=personalpay;package=ar.com.personalpay;end" class="app-btn" title="Personal Pay">
                    <div class="app-icon ppay">PP</div>
                    <span>Personal Pay</span>
                </a>
            </div>

            <!-- Botones de Acción -->
            <div class="actions-stack">
                <a href="https://wa.me/5493874493131" target="_blank" rel="noopener" class="btn btn-whatsapp">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                    Contactar por WhatsApp
                </a>
                <button id="btnShare" class="btn btn-share">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
                    Compartir Perfil
                </button>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
