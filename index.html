<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hernán · Alias Prex</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --uber-black: #000000;
    --didi-orange: #FF7300;
    --bg-dark: #0a0a0f;
    --card-bg: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08);
    --text-dim: rgba(255,255,255,0.55);
  }

  body {
    min-height: 100vh;
    background:
      radial-gradient(circle at 20% 20%, rgba(255,115,0,0.15), transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(255,255,255,0.06), transparent 40%),
      var(--bg-dark);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    color: white;
    padding: 24px;
  }

  .card {
    width: 100%;
    max-width: 420px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 40px 32px;
    backdrop-filter: blur(20px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    text-align: center;
    animation: fadeUp 0.6s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .logos {
    display: flex;
    justify-content: center;
    gap: 18px;
    margin-bottom: 28px;
  }

  .logo-chip {
    width: 64px;
    height: 64px;
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.5px;
  }

  .chip-uber {
    background: var(--uber-black);
    border: 1px solid rgba(255,255,255,0.15);
    color: white;
  }

  .chip-didi {
    background: var(--didi-orange);
    color: white;
  }

  h1 {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 6px;
  }

  .subtitle {
    color: var(--text-dim);
    font-size: 14px;
    margin-bottom: 28px;
  }

  .alias-box {
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    margin-bottom: 18px;
  }

  .alias-text {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.3px;
    word-break: break-all;
    text-align: center;
  }

  .copy-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--didi-orange), #ff9333);
    border: none;
    color: white;
    font-weight: 600;
    font-size: 14px;
    padding: 12px 18px;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    box-shadow: 0 6px 18px rgba(255,115,0,0.35);
  }

  .copy-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 22px rgba(255,115,0,0.45);
  }

  .copy-btn:active {
    transform: translateY(0);
  }

  .copy-btn.copied {
    background: linear-gradient(135deg, #22c55e, #16a34a);
    box-shadow: 0 6px 18px rgba(34,197,94,0.35);
  }

  .footer-note {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 8px;
  }
</style>
</head>
<body>

  <div class="card">
    <div class="logos">
      <div class="logo-chip chip-uber">UBER</div>
      <div class="logo-chip chip-didi">DiDi</div>
    </div>

    <h1>Hernán</h1>
    <div class="subtitle">Conductor Uber &amp; DiDi</div>

    <div class="alias-box">
      <span class="alias-text" id="alias">hernanuber.prex</span>
      <button class="copy-btn" id="copyBtn" onclick="copyAlias()">Copiar</button>
    </div>

    <div class="footer-note">Alias para transferencias</div>
  </div>

  <script>
    function copyAlias() {
      const alias = document.getElementById('alias').innerText;
      const btn = document.getElementById('copyBtn');

      navigator.clipboard.writeText(alias).then(() => {
        btn.innerText = '¡Copiado!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.innerText = 'Copiar';
          btn.classList.remove('copied');
        }, 1800);
      }).catch(() => {
        // fallback para navegadores viejos
        const temp = document.createElement('textarea');
        temp.value = alias;
        document.body.appendChild(temp);
        temp.select();
        document.execCommand('copy');
        document.body.removeChild(temp);
        btn.innerText = '¡Copiado!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.innerText = 'Copiar';
          btn.classList.remove('copied');
        }, 1800);
      });
    }
  </script>

</body>
</html>
